syntax = "proto3";

package identity.v1;

import "google/protobuf/empty.proto";

service IdentityService {
  rpc HealthCheck (HealthCheckRequest) returns (HealthCheckResponse);

  // Use Phone Number to send SMS verification code
  rpc SendSms (SendSmsRequest) returns (SendSmsResponse);

  // Verify SMS code to get a verification token
  rpc VerifySms (VerifySmsRequest) returns (VerifySmsResponse);

  // Register with Phone (verified) and Password
  rpc Register (RegisterRequest) returns (RegisterResponse);

  // Login with Phone and Password
  rpc Login (LoginRequest) returns (LoginResponse);

  // Refresh access token using refresh token
  rpc RefreshToken (RefreshTokenRequest) returns (RefreshTokenResponse);

  // Logout by revoking refresh token
  rpc Logout (LogoutRequest) returns (LogoutResponse);

  // Reset password using SMS-verified token
  rpc ResetPassword (ResetPasswordRequest) returns (ResetPasswordResponse);

  // Get current account session
  rpc GetCurrentAccount (google.protobuf.Empty) returns (Account);

  // Deactivate (soft-delete) the current account. 30-day grace, then hard-delete via cron.
  rpc DeactivateAccount (DeactivateAccountRequest) returns (DeactivateAccountResponse);
}

message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;
}

message SendSmsRequest {
  string phone_number = 1;
}

message SendSmsResponse {
  bool success = 1;
  // In dev/test, we might return the code here for convenience, but skipping for now.
}

message VerifySmsRequest {
  string phone_number = 1;
  string code = 2;
}

message VerifySmsResponse {
  string verification_token = 1; // Token proving phone ownership
}

message RegisterRequest {
  string phone_number = 1;
  string password = 2;
  string verification_token = 3; // Must match the one from VerifySms
  Role role = 4;
}

message RegisterResponse {
  string access_token = 1;
  Account account = 2;
  string refresh_token = 3;
}

message LoginRequest {
  string phone_number = 1;
  string password = 2;
  Role role = 3;
}

message LoginResponse {
  string access_token = 1;
  Account account = 2;
  string refresh_token = 3;
  bool reactivated = 4;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message LogoutRequest {
  string refresh_token = 1;
}

message LogoutResponse {
  bool success = 1;
}

message ResetPasswordRequest {
  string phone_number = 1;
  string new_password = 2;
  string verification_token = 3; // Must match the one from VerifySms
}

message ResetPasswordResponse {
  bool success = 1;
}

enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_GUEST = 1;
  ROLE_CAST = 2;
}

message Account {
  string id = 1;
  string phone_number = 2;
  Role role = 3;
}

message DeactivateAccountRequest {}
message DeactivateAccountResponse {}
