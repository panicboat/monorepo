syntax = "proto3";

package relationship.v1;

// BlockService handles Cast→Guest blocking.
// Only casts can block guests. Guest→Cast blocking is not supported.
service BlockService {
  // BlockUser blocks a guest. The caller must be a cast.
  rpc BlockUser(BlockUserRequest) returns (BlockUserResponse);
  // UnblockUser unblocks a previously blocked guest.
  rpc UnblockUser(UnblockUserRequest) returns (UnblockUserResponse);
  // ListBlocked returns the list of guests blocked by the calling cast.
  rpc ListBlocked(ListBlockedRequest) returns (ListBlockedResponse);
  // GetBlockStatus checks whether the calling cast has blocked the given guest(s).
  rpc GetBlockStatus(GetBlockStatusRequest) returns (GetBlockStatusResponse);
  // ListBlockedBy returns casts who have blocked a specific guest.
  rpc ListBlockedBy(ListBlockedByRequest) returns (ListBlockedByResponse);
}

// BlockedUser represents a user involved in a block relationship.
message BlockedUser {
  string id = 1;
  string user_type = 2; // "guest" (blocked target)
  string name = 3;
  string image_url = 4;
  string blocked_at = 5; // ISO8601
}

message BlockUserRequest {
  string blocked_id = 1;   // Guest user ID to block
  string blocked_type = 2; // Always "guest"
  string blocker_type = 3; // Always "cast" (caller's role)
}

message BlockUserResponse {
  bool success = 1;
}

message UnblockUserRequest {
  string blocked_id = 1; // Guest user ID to unblock
}

message UnblockUserResponse {
  bool success = 1;
}

message ListBlockedRequest {
  int32 limit = 1;   // default: 50, max: 100
  string cursor = 2; // optional, for pagination
}

message ListBlockedResponse {
  repeated BlockedUser users = 1;
  string next_cursor = 2;
  bool has_more = 3;
}

message GetBlockStatusRequest {
  repeated string user_ids = 1; // Guest user IDs to check
}

message GetBlockStatusResponse {
  map<string, bool> blocked = 1; // guest_user_id -> is_blocked
}

message ListBlockedByRequest {
  string target_user_id = 1; // Guest user ID
}

message ListBlockedByResponse {
  repeated BlockedUser blockers = 1; // Casts who blocked this guest
}
