name: 'Auto Label - Deploy Trigger'

on:
  pull_request:
    types: [labeled, closed]
    branches:
      - '**'

permissions:
  id-token: write
  contents: read
  packages: write
  pull-requests: write

concurrency:
  group: deploy-trigger-${{ github.event.pull_request.number }}-${{ github.event.action }}
  cancel-in-progress: ${{ github.event.action == 'labeled' }}

jobs:
  deploy-trigger:
    name: 'Deployment Trigger'
    if: github.event.action == 'labeled' || (github.event.action == 'closed' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.resolver.outputs.targets }}
      has-targets: ${{ steps.resolver.outputs.has-targets }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Label Resolver
        id: resolver
        uses: panicboat/deploy-actions/label-resolver@3399490d98d6e4d4ff1a06badfd63d9f9a0c8699 # v1.1.0
        with:
          repository: ${{ github.repository }}
          pr-number: ${{ github.event.pull_request.number }}
          github-token: ${{ steps.app-token.outputs.token }}
          config-path: 'workflow-config.yaml'

  deploy-terragrunt:
    name: 'Deploy Terragrunt (${{ matrix.target.service }}:${{ matrix.target.environment }})'
    needs: deploy-trigger
    if: |
      needs.deploy-trigger.outputs.has-targets == 'true' &&
      contains(needs.deploy-trigger.outputs.targets, '"stack":"terragrunt"')
    strategy:
      matrix:
        target: ${{ fromJson(needs.deploy-trigger.outputs.targets) }}
      fail-fast: false
    uses: ./.github/workflows/reusable--terragrunt-executor.yaml
    with:
      service-name: ${{ matrix.target.service }}
      environment: ${{ matrix.target.environment }}
      action-type: ${{ matrix.target.stack == 'terragrunt' && (github.event.pull_request.merged && 'apply' || 'plan') || '' }}
      iam-role: ${{ github.event.pull_request.merged && matrix.target.iam_role_apply || matrix.target.iam_role_plan }}
      aws-region: ${{ matrix.target.aws_region }}
      working-directory: ${{ matrix.target.working_directory }}
      app-id: ${{ vars.APP_ID }}
      pr-number: ${{ github.event.pull_request.number }}
    secrets:
      private-key: ${{ secrets.APP_PRIVATE_KEY }}

  deploy-container:
    name: 'Deploy Container (${{ matrix.target.service }})'
    needs: deploy-trigger
    if: |
      needs.deploy-trigger.outputs.has-targets == 'true' &&
      contains(needs.deploy-trigger.outputs.targets, '"stack":"docker"')
    strategy:
      matrix:
        target: ${{ fromJson(needs.deploy-trigger.outputs.targets) }}
      fail-fast: false
    uses: ./.github/workflows/reusable--container-builder.yaml
    with:
      image-name: ${{ matrix.target.stack == 'docker' && matrix.target.service || '' }}
      working-directory: ${{ matrix.target.working_directory }}
      app-id: ${{ vars.APP_ID }}
    secrets:
      private-key: ${{ secrets.APP_PRIVATE_KEY }}

  deploy-kubernetes:
    name: 'Deploy Kubernetes (${{ matrix.target.service }}:${{ matrix.target.environment }})'
    needs: deploy-trigger
    if: |
      github.event.action == 'labeled' &&
      needs.deploy-trigger.outputs.has-targets == 'true' &&
      contains(needs.deploy-trigger.outputs.targets, '"stack":"kubernetes"')
    strategy:
      matrix:
        target: ${{ fromJson(needs.deploy-trigger.outputs.targets) }}
      fail-fast: false
    uses: ./.github/workflows/reusable--kubernetes-builder.yaml
    with:
      service-name: ${{ matrix.target.service }}
      environment: ${{ matrix.target.environment }}
      path: ${{ matrix.target.stack == 'kubernetes' && matrix.target.working_directory || '' }}
      app-id: ${{ vars.APP_ID }}
      pr-number: ${{ github.event.pull_request.number }}
    secrets:
      private-key: ${{ secrets.APP_PRIVATE_KEY }}

  # cleanup-container:
  #   name: 'Cleanup Container'
  #   needs: deploy-trigger
  #   runs-on: ubuntu-latest
  #   if: |
  #     needs.deploy-trigger.outputs.has-targets == 'true' &&
  #     contains(needs.deploy-trigger.outputs.targets, '"stack":"docker"')
  #   strategy:
  #     matrix:
  #       target: ${{ fromJson(needs.deploy-trigger.outputs.targets) }}
  #     fail-fast: false
  #   steps:
  #     - name: Cleanup container
  #       uses: dataaxiom/ghcr-cleanup-action@v1.0.16
  #       if: matrix.target.stack == 'docker'
  #       with:
  #         token: ${{ secrets.GITHUB_TOKEN }}
  #         package: monorepo/${{ matrix.target.service }}
  #         keep-n-untagged: 0
  #         use-regex: true
  #   continue-on-error: true

  deployment-summary:
    name: 'Deployment Summary'
    needs: [deploy-trigger, deploy-terragrunt, deploy-container, deploy-kubernetes]
    if: always() && needs.deploy-trigger.outputs.has-targets == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "📊 Deployment Summary"
          echo "Event: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Environment: ${{ needs.deploy-trigger.outputs.target-environment }}"
          echo "Safety Status: ${{ needs.deploy-trigger.outputs.safety-status }}"
          echo "Targets: ${{ needs.deploy-trigger.outputs.targets }}"
          echo "Terragrunt Job Status: ${{ needs.deploy-terragrunt.result }}"
          echo "Container Job Status: ${{ needs.deploy-container.result }}"
          echo "Kubernetes Job Status: ${{ needs.deploy-kubernetes.result }}"
          echo "Cleanup Job Status: ${{ needs.cleanup-container.result }}"
