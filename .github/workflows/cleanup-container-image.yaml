name: 'Cleanup Container Images'

on:
  schedule:
    # Run daily at 01:00 JST
    - cron: '0 16 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  packages: write

jobs:
  cleanup-container:
    name: 'Cleanup ${{ matrix.service }}'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ["monolith", "frontend"]
      fail-fast: false
    steps:
      # Step 1: Clean old PR tags (pr-*, older than retention days)
      - name: Clean old PR tags
        uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4 # v1.0.16
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          package: ${{ github.event.repository.name }}/${{ matrix.service }}
          delete-tags: ^pr-
          older-than: 1 days
          exclude-tags: ^(latest|v\d+\.\d+\.\d+.*)$
          use-regex: true
          validate: true

      # Step 2: Clean all SHA tags (sha-*, regardless of age)
      - name: Clean SHA tags
        uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4 # v1.0.16
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          package: ${{ github.event.repository.name }}/${{ matrix.service }}
          delete-tags: ^sha-
          exclude-tags: ^(latest|v\d+\.\d+\.\d+.*)$
          use-regex: true
          validate: true

      # Step 3: Clean all untagged images and orphaned images
      - name: Clean untagged images
        uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4 # v1.0.16
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          package: ${{ github.event.repository.name }}/${{ matrix.service }}
          keep-n-untagged: 0
          delete-orphaned-images: true
          delete-ghost-images: true
          delete-partial-images: true
          exclude-tags: ^(latest|v\d+\.\d+\.\d+.*)$
          use-regex: true
          validate: true

  summary:
    name: 'Cleanup Summary'
    needs: cleanup-container
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "📊 Cleanup Summary"
          echo "Services: monorepo/handbooks, monorepo/monolith, monorepo/frontend"
          echo "Cleanup job status: ${{ needs.cleanup-container.result }}"
