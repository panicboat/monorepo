# Replacing the prod overlay's ExternalSecret (AWS Secrets Manager) with a plaintext Secret locally.
# Name is monolith-database to match the base Deployment's secretRef.
apiVersion: v1
kind: Secret
metadata:
  name: monolith-database
type: Opaque
stringData:
  DATABASE_URL: postgres://monolith:monolith@postgres:5432/monolith
