apiVersion: apps/v1
kind: Deployment
metadata:
  name: monolith
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: monolith
  template:
    metadata:
      labels:
        app: monolith
      annotations:
        instrumentation.opentelemetry.io/inject-ruby: "default/panicboat-application"
    spec:
      containers:
        - name: monolith
          image: ghcr.io/panicboat/monorepo/monolith:latest # {"$imagepolicy": "flux-system:monolith"}
          imagePullPolicy: IfNotPresent
          command: ["./bin/start"]
          ports:
            - containerPort: 9001
          envFrom:
            - configMapRef:
                name: monolith
            - secretRef:
                name: monolith-database
