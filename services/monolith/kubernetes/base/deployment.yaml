apiVersion: apps/v1
kind: Deployment
metadata:
  name: monolith
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: monolith
  template:
    metadata:
      labels:
        app: monolith
    spec:
      containers:
        - name: monolith
          image: ghcr.io/panicboat/monorepo/monolith:latest # {"$imagepolicy": "flux-system:monolith"}
          imagePullPolicy: IfNotPresent
          command: ["./bin/start"]
          ports:
            - containerPort: 9001
          env:
            # OTel SDK auto-detect 用 env vars (= platform 側 OTel Operator chart 0.112.1 では
            # Ruby auto-injection (= spec.ruby) 未 support のため、 ここで hardcode する。
            # application code (= config/initializers/opentelemetry.rb) は env vars を
            # auto-detect で SDK config。 引き継ぎ事項 #25 (= chart upgrade) で本 env
            # hardcode 撤去 + inject-ruby annotation 復活予定。)
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://opentelemetry-collector.monitoring.svc.cluster.local:4317
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.name=monolith
            # exporter / propagator を明示しないと OTel SDK Ruby default = noop で span 消失。
            # OTel Operator inject-ruby が auto 設定するはずの env vars を hardcode で 補完。
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            - name: OTEL_METRICS_EXPORTER
              value: otlp
            - name: OTEL_LOGS_EXPORTER
              value: otlp
            - name: OTEL_PROPAGATORS
              value: tracecontext,baggage
          envFrom:
            - configMapRef:
                name: monolith
            - secretRef:
                name: monolith-database
