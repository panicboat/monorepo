apiVersion: apps/v1
kind: Deployment
metadata:
  name: monolith
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: monolith
  template:
    metadata:
      labels:
        app: monolith
      annotations:
        # Ruby auto-injection annotation。 OTel Operator chart 0.113.0 では
        # Ruby unsupported で silently ignore、 monolith Pod の trace 取得は不在。
        # 引き継ぎ #25 / spec: docs/superpowers/specs/2026-05-17-monolith-otel-preempt-design.md
        instrumentation.opentelemetry.io/inject-ruby: default/panicboat-application
    spec:
      containers:
        - name: monolith
          image: ghcr.io/panicboat/monorepo/monolith:latest
          imagePullPolicy: IfNotPresent
          command: ["./bin/start"]
          ports:
            - containerPort: 9001
          envFrom:
            - configMapRef:
                name: monolith
            - secretRef:
                name: monolith-database
